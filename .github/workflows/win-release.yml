name: Release Windows MSI package

on:
  push:
    branches:
      - main
      - win
  repository_dispatch:
    types: [docker-aiv-release]

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

jobs:
  extract-jar:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      release: ${{ steps.release.outputs.RELEASE }}

    steps:
      - uses: actions/checkout@v4

      - name: Merge docker-aiv files
        run: |
          git clone https://github.com/aiv-code/docker-aiv --depth 1
          rsync -av --ignore-existing --exclude='.git' docker-aiv/ ./
          rm -rf docker-aiv

      - name: Fetch all tags
        run: git fetch --tags

      - name: Parse Version from docker-compose.yml
        id: version
        run: |
          VERSION=$(awk '/image: aivhub\/aiv:/ {print $2}' docker-compose.yml | cut -d':' -f2 | head -n1)
          if [[ -z "$VERSION" ]]; then
            echo "Error: Could not parse version from docker-compose.yml"
            exit 1
          fi
          echo "Parsed version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine Release Number
        id: release
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/win/${VERSION}"; then
            echo "Tag win/${VERSION}-* already exists. Finding latest release number."
            LATEST_RELEASE=$(git ls-remote --tags origin | grep "refs/tags/win/${VERSION}-" \
              | sed "s/.*win\/${VERSION}-//" | sort -V | tail -n1)
            [[ -z "$LATEST_RELEASE" ]] && LATEST_RELEASE=0
            RELEASE=$((LATEST_RELEASE + 1))
            echo "Incremented release number to $RELEASE"
          else
            echo "No existing tags found for version ${VERSION}. Setting release number to 0."
            RELEASE=0
          fi
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
          echo "RELEASE=$RELEASE" >> $GITHUB_OUTPUT
          echo "Using release number: $RELEASE"

      - name: Get aiv.jar from Docker image
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          echo "Pulling aivhub/aiv:${VERSION}"
          docker pull aivhub/aiv:${VERSION}
          docker create --name aiv_container aivhub/aiv:${VERSION}
          docker cp aiv_container:/opt/run.jar aiv.jar
          docker rm -f aiv_container

      - name: Upload aiv.jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiv-jar
          path: aiv.jar
          retention-days: 1

  build:
    runs-on: windows-latest
    needs: extract-jar
    env:
      VERSION: ${{ needs.extract-jar.outputs.version }}
      RELEASE: ${{ needs.extract-jar.outputs.release }}

    steps:
      - uses: actions/checkout@v4

      - name: Merge docker-aiv files
        shell: pwsh
        run: |
          git clone https://github.com/aiv-code/docker-aiv --depth 1
          # Replicate rsync -av --ignore-existing --exclude='.git'
          Get-ChildItem -Path docker-aiv -Recurse -Force |
            Where-Object { $_.FullName -notmatch '\\.git' } |
            ForEach-Object {
              $dest = $_.FullName.Replace("$PWD\docker-aiv\", "$PWD\")
              if ($_.PSIsContainer) {
                New-Item -ItemType Directory -Force $dest | Out-Null
              } elseif (-not (Test-Path $dest)) {
                Copy-Item $_.FullName $dest -Force
              }
            }
          Remove-Item -Recurse -Force docker-aiv

      - name: Download aiv.jar artifact
        uses: actions/download-artifact@v4
        with:
          name: aiv-jar

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install WiX Toolset v4
        shell: pwsh
        env:
          WIX_ACCEPT_OSMF_EULA: "1"
        run: |
          dotnet tool install --global wix
          wix eula accept wix7
          wix extension add WixToolset.Util.wixext

      - name: Build Windows MSI
        shell: pwsh
        run: |
          .\aiv-build-win.ps1 -Version $env:VERSION -Release $env:RELEASE

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-msi
          path: aiv-${{ env.VERSION }}-${{ env.RELEASE }}.msi

      - name: Create and Push Tag
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=win/${VERSION}-${RELEASE}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${TAG_NAME}
          git push origin ${TAG_NAME}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: win/${{ env.VERSION }}-${{ env.RELEASE }}
          name: "Windows MSI package ${{ env.VERSION }}-${{ env.RELEASE }}"
          body: |
            Windows MSI release for AIV version ${{ env.VERSION }}-${{ env.RELEASE }}

            - Download the latest MSI at https://github.com/aiv-code/docker-aiv/releases

            **Requirements:** Java 17 or later must be installed before running the installer.

            ### Install AIV
            ```powershell
            msiexec /i aiv-${{ env.VERSION }}-${{ env.RELEASE }}.msi /qn
            ```

            ### Upgrade AIV
            ```powershell
            msiexec /i aiv-${{ env.VERSION }}-${{ env.RELEASE }}.msi /qn
            ```

            ### Uninstall AIV
            ```powershell
            msiexec /x aiv-${{ env.VERSION }}-${{ env.RELEASE }}.msi /qn
            ```

            The AIV Windows Service (`AIVService`) starts automatically after installation.

          files: |
            aiv-${{ env.VERSION }}-${{ env.RELEASE }}.msi
